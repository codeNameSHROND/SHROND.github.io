    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap");
      .planet {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: radial-gradient(
          circle at center,
          rgb(23, 23, 23) 10%,
          rgb(31, 31, 31) 40%,
          rgb(41, 41, 41) 100%
        );
        position: relative;
      }

      .moon {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background-color: white;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: rotate 5s linear infinite;
      }

      @keyframes rotate {
        0% {
          transform: translate(-50%, -50%) rotate(0deg) translate(60px)
            rotate(0deg);
        }
        100% {
          transform: translate(-50%, -50%) rotate(360deg) translate(60px)
            rotate(-360deg);
        }
      }
    </style>
